<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-col">
      <h3>{{ site.title | escape }}</h3>
      <p>{{ site.description | escape }}</p>
    </div>
    <div class="footer-col">
      <h4>Categories</h4>
      <ul class="footer-links">
        <li><a href="{{ '/categories/printables/' | relative_url }}">Printables</a></li>
        <li><a href="{{ '/categories/templates/' | relative_url }}">Templates</a></li>
        <li><a href="{{ '/categories/systems/' | relative_url }}">Systems</a></li>
        <li><a href="{{ '/categories/prompts-guides/' | relative_url }}">Prompts & Guides</a></li>
      </ul>
    </div>
    <div class="footer-col">
      <h4>More</h4>
      <ul class="footer-links">
        <li><a href="{{ '/blog/' | relative_url }}">All Articles</a></li>
        <li><a href="https://github.com/{{ site.github_username }}">GitHub</a></li>
        <li><a href="{{ '/feed.xml' | relative_url }}">RSS Feed</a></li>
      </ul>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}. Built with research.</p>
  </div>
</footer>
