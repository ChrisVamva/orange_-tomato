<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Dark background -->
  <rect width="48" height="48" rx="8" fill="#0D0D0D"/>
  <!-- Tomato body - orange circle -->
  <circle cx="24" cy="26" r="14" fill="#FF4500"/>
  <circle cx="24" cy="26" r="14" fill="url(#tg)" opacity="0.4"/>
  <!-- Highlight -->
