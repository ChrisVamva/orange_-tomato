  <line x1="16" y1="34" x2="32" y2="18" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Corner reticle brackets -->
  <path d="M4 12 L4 4 L12 4" fill="none" stroke="#FF4500" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M36 4 L44 4 L44 12" fill="none" stroke="#FF4500" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M4 36 L4 44 L12 44" fill="none" stroke="#FF4500" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M36 44 L44 44 L44 36" fill="none" stroke="#FF4500" stroke-width="2.5" stroke-linecap="round"/>
  <defs>
    <radialGradient id="tg" cx="0.4" cy="0.3">
      <stop offset="0%" stop-color="#FF6A33"/>
      <stop offset="100%" stop-color="#CC3700"/>
    </radialGradient>
  </defs>
</svg>